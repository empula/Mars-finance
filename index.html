<div class="slabel">
  <div class="slabel-bar"></div>
  <div class="slabel-txt">Canlı Haber Akışı</div>
  <div class="slabel-count" id="newsCount">0 Haber</div>
</div>

<div class="news-card">
  <div class="news-head">
    <div class="news-head-l">
      <div class="news-ava">🌐</div>
      <div>
        <div class="news-ttl">Dünya Gündemi</div>
        <div class="news-sub">Finans · Ekonomi · Kripto</div>
      </div>
    </div>
    <button class="news-rbtn" onclick="fetchNews()">↻</button>
  </div>
  
  <div class="news-items" id="newsList">
    <div class="news-load"><span class="news-spin">⏳</span>Haberler güncelleniyor...</div>
  </div>
  
  <button id="loadMoreBtn" class="rbtn" style="width:calc(100% - 32px); margin:10px 16px 16px; justify-content:center; display:none;" onclick="renderNews(true)">
    Daha Fazla Haber Gör
  </button>
</div>

<script>
// HABER SİSTEMİ (JS KISMI)
let allNews = [];
let newsLimit = 4;

async function fetchNews() {
    const list = document.getElementById('newsList');
    try {
        // Gerçek Google News Finans verilerini çeker
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=ekonomi+kripto+borsa&hl=tr&gl=TR&ceid=TR:tr');
        const data = await response.json();
        
        if(data.status === 'ok') {
            allNews = data.items;
            newsLimit = 4; 
            renderNews();
        }
    } catch (e) {
        list.innerHTML = '<div class="news-load">Haberler şu an yüklenemedi.</div>';
    }
}

function renderNews(loadMore = false) {
    if(loadMore) newsLimit += 4;
    
    const list = document.getElementById('newsList');
    const itemsToShow = allNews.slice(0, newsLimit);
    
    list.innerHTML = itemsToShow.map(item => `
        <a href="${item.link}" target="_blank" class="ni" style="text-decoration:none; color:inherit; display:flex; padding:15px; border-bottom:1px solid var(--border);">
            <div class="ni-body">
                <div class="ni-title" style="font-weight:600; font-size:14px; margin-bottom:5px;">${item.title}</div>
                <div class="ni-meta" style="font-size:11px; color:var(--text3);">
                    <span style="color:var(--blue); font-weight:700;">${item.source}</span> • <span>${new Date(item.pubDate).toLocaleDateString('tr-TR')}</span>
                </div>
            </div>
        </a>
    `).join('');
    
    document.getElementById('newsCount').textContent = allNews.length + ' Haber';
    document.getElementById('loadMoreBtn').style.display = newsLimit < allNews.length ? 'flex' : 'none';
}

// Sayfa açıldığında haberleri çek
window.onload = () => {
    if(typeof fetchNews === 'function') fetchNews();
};
</script>
